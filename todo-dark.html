<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List - Dark Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            width: 100%;
            max-width: 480px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #f0f0f0;
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: 600;
        }

        .subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 14px;
            background: #252525;
            border: 1px solid #404040;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 15px;
            transition: all 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #555;
            background: #2a2a2a;
        }

        input[type="text"]::placeholder {
            color: #666;
        }

        button {
            padding: 12px 18px;
            background: #333;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        button:hover {
            background: #404040;
            border-color: #555;
        }

        button:active {
            transform: scale(0.98);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 12px 0;
            border-bottom: 1px solid #333;
            font-size: 13px;
        }

        .stat-item {
            color: #888;
        }

        .stat-number {
            color: #f0f0f0;
            font-weight: 600;
            margin-right: 4px;
        }

        .todo-list {
            list-style: none;
            max-height: 500px;
            overflow-y: auto;
        }

        .todo-list::-webkit-scrollbar {
            width: 6px;
        }

        .todo-list::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .todo-list::-webkit-scrollbar-thumb {
            background: #404040;
            border-radius: 3px;
        }

        .todo-list::-webkit-scrollbar-thumb:hover {
            background: #505050;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            border-bottom: 1px solid #252525;
            transition: background 0.15s;
        }

        .todo-item:last-child {
            border-bottom: none;
        }

        .todo-item:hover {
            background: #242424;
        }

        .todo-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #666;
        }

        .todo-text {
            flex: 1;
            color: #e0e0e0;
            font-size: 15px;
            word-break: break-word;
            line-height: 1.4;
        }

        .todo-item.completed .todo-text {
            color: #666;
            text-decoration: line-through;
        }

        .delete-btn {
            background: transparent;
            color: #888;
            padding: 6px 10px;
            font-size: 13px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .delete-btn:hover {
            background: #333;
            color: #ff6b6b;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 50px 20px;
            font-size: 14px;
        }

        .empty-state-icon {
            font-size: 40px;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .clear-all {
            width: 100%;
            margin-top: 15px;
            background: #252525;
            color: #888;
            border: 1px solid #333;
            padding: 10px;
            font-size: 13px;
        }

        .clear-all:hover {
            background: #2a2a2a;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Tasks</h1>
        <div class="subtitle">Keep track of your work</div>

        <div class="input-group">
            <input
                type="text"
                id="todoInput"
                placeholder="Add a new task..."
                autocomplete="off"
            >
            <button onclick="addTodo()">Add</button>
        </div>

        <div class="stats">
            <span class="stat-item">
                <span class="stat-number" id="totalCount">0</span>tasks
            </span>
            <span class="stat-item">
                <span class="stat-number" id="completedCount">0</span>completed
            </span>
        </div>

        <ul class="todo-list" id="todoList"></ul>

        <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">🎯</div>
            <div>No tasks yet. Add one to get started!</div>
        </div>

        <button class="clear-all" id="clearAllBtn" onclick="clearCompleted()" style="display: none;">
            Clear completed tasks
        </button>
    </div>

    <script>
        const todoInput = document.getElementById('todoInput');
        const todoList = document.getElementById('todoList');
        const emptyState = document.getElementById('emptyState');
        const totalCount = document.getElementById('totalCount');
        const completedCount = document.getElementById('completedCount');
        const clearAllBtn = document.getElementById('clearAllBtn');

        // 로컬스토리지에서 todo 로드
        function loadTodos() {
            const saved = localStorage.getItem('todos-dark');
            return saved ? JSON.parse(saved) : [];
        }

        // 로컬스토리지에 저장
        function saveTodos(todos) {
            localStorage.setItem('todos-dark', JSON.stringify(todos));
        }

        // 통계 업데이트
        function updateStats() {
            const todos = loadTodos();
            const completed = todos.filter(t => t.completed).length;
            totalCount.textContent = todos.length;
            completedCount.textContent = completed;
            clearAllBtn.style.display = completed > 0 ? 'block' : 'none';
        }

        // 화면 렌더링
        function renderTodos() {
            const todos = loadTodos();
            todoList.innerHTML = '';

            if (todos.length === 0) {
                emptyState.style.display = 'block';
                updateStats();
                return;
            }

            emptyState.style.display = 'none';

            todos.forEach((todo, index) => {
                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;

                li.innerHTML = `
                    <input
                        type="checkbox"
                        ${todo.completed ? 'checked' : ''}
                        onchange="toggleTodo(${index})"
                    >
                    <span class="todo-text">${escapeHtml(todo.text)}</span>
                    <button class="delete-btn" onclick="deleteTodo(${index})">×</button>
                `;

                todoList.appendChild(li);
            });

            updateStats();
        }

        function addTodo() {
            const text = todoInput.value.trim();
            if (!text) return;

            const todos = loadTodos();
            todos.push({ text, completed: false });
            saveTodos(todos);

            todoInput.value = '';
            renderTodos();
            todoInput.focus();
        }

        function toggleTodo(index) {
            const todos = loadTodos();
            todos[index].completed = !todos[index].completed;
            saveTodos(todos);
            renderTodos();
        }

        function deleteTodo(index) {
            const todos = loadTodos();
            todos.splice(index, 1);
            saveTodos(todos);
            renderTodos();
        }

        function clearCompleted() {
            const todos = loadTodos();
            const filtered = todos.filter(t => !t.completed);
            saveTodos(filtered);
            renderTodos();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 엔터 키 지원
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        // 초기 렌더링
        renderTodos();
    </script>
</body>
</html>
